<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos - Sistema de Biblioteca</title>
</head>

<body>

    <nav>
        <h2>Biblioteca Local</h2>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="libros.html">Libros</a></li>
            <li><a href="prestamo.html">Préstamos</a></li>
            <li><a href="#" id="btnCerrarSesion">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <hr>

    <main>
        <h1>Módulo de Préstamos</h1>

        <!-- ===== SOLICITAR PRÉSTAMO ===== -->
        <section id="seccionSolicitar">
            <h2>Solicitar Préstamo</h2>
            <form id="formSolicitar">
                <label for="libroSelect">Seleccionar Libro:</label>
                <select id="libroSelect" required>
                    <option value="">-- Elige un libro disponible --</option>
                </select>
                <br><br>
                <label for="fechaDevolucion">Fecha de Devolución:</label>
                <input type="date" id="fechaDevolucion" required>
                <br><br>
                <button type="submit">Solicitar Préstamo</button>
            </form>
            <p id="mensajeSolicitar"></p>
        </section>

        <hr>

        <!-- ===== MIS PRÉSTAMOS / TODOS LOS PRÉSTAMOS ===== -->
        <section id="seccionPrestamos">
            <h2 id="tituloPrestamos">Mis Préstamos</h2>

            <!-- Filtro de estado -->
            <label for="filtroEstado">Filtrar por estado:</label>
            <select id="filtroEstado">
                <option value="">Todos</option>
                <option value="pendiente">Pendiente</option>
                <option value="prestado">Prestado</option>
                <option value="devuelto">Devuelto</option>
            </select>
            <button onclick="cargarPrestamos()">Actualizar</button>

            <br><br>

            <table id="tablaPrestamos" border="1" cellpadding="6" cellspacing="0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Libro</th>
                        <th>Fecha Préstamo</th>
                        <th>Fecha Devolución</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="bodyPrestamos">
                    <tr><td colspan="7">Cargando...</td></tr>
                </tbody>
            </table>
        </section>

        <!-- ===== PANEL ADMIN: CAMBIAR ESTADO ===== -->
        <section id="panelAdmin" style="display:none;">
            <hr>
            <h2>Panel Admin — Cambiar Estado de Préstamo</h2>
            <form id="formCambiarEstado">
                <label for="prestamoId">ID del Préstamo:</label>
                <input type="number" id="prestamoId" placeholder="Ej: 3" required>
                &nbsp;
                <label for="nuevoEstado">Nuevo Estado:</label>
                <select id="nuevoEstado">
                    <option value="pendiente">Pendiente</option>
                    <option value="prestado">Prestado</option>
                    <option value="devuelto">Devuelto</option>
                </select>
                &nbsp;
                <button type="submit">Aplicar Cambio</button>
            </form>
            <p id="mensajeAdmin"></p>
        </section>
    </main>

    <!-- Scripts: primero el helper, luego la lógica -->
    <script src="js/api.js"></script>
    <script src="js/prestamo.js"></script>

</body>
</html>
